<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>単価計算</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #ff8000;
    --accent-light: #fff3e0;
    --bg: #f2f2f7;
    --card: #ffffff;
    --text: #1c1c1e;
    --sub: #6c6c70;
    --border: #e5e5ea;
    --tab-h: 56px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; }

  /* ─── Layout ─── */
  .screen { display: none; flex-direction: column; height: calc(100dvh - var(--tab-h) - var(--safe-bottom)); overflow-y: auto; padding: 16px 16px 8px; gap: 12px; }
  .screen.active { display: flex; }

  /* ─── Tab bar ─── */
  .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: calc(var(--tab-h) + var(--safe-bottom)); padding-bottom: var(--safe-bottom); background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid var(--border); display: flex; }
  .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; background: none; border: none; color: var(--sub); font-size: 10px; cursor: pointer; padding-top: 6px; }
  .tab-btn svg { width: 24px; height: 24px; }
  .tab-btn.active { color: var(--accent); }

  /* ─── Cards ─── */
  .card { background: var(--card); border-radius: 14px; padding: 16px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }

  /* ─── Form rows ─── */
  .row { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: none; }
  .row label { font-size: 16px; min-width: 40px; }
  .row input, .row select { flex: 1; border: none; outline: none; font-size: 16px; font-family: inherit; text-align: right; background: transparent; color: var(--text); }
  .row select { max-width: 80px; }
  .row .unit { color: var(--sub); font-size: 15px; }

  /* ─── Result ─── */
  .result-box { background: var(--accent-light); border-radius: 12px; padding: 16px; text-align: center; }
  .result-label { font-size: 13px; color: var(--sub); margin-bottom: 4px; }
  .result-value { font-size: 32px; font-weight: 700; color: var(--accent); }
  .result-sub { font-size: 13px; color: var(--sub); margin-top: 2px; }

  /* ─── Buttons ─── */
  .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--card); color: var(--accent); border: 1.5px solid var(--accent); }
  .btn:disabled { opacity: .4; }

  /* ─── Favorites ─── */
  .search-bar { background: var(--card); border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; gap: 8px; }
  .search-bar input { border: none; outline: none; flex: 1; font-size: 16px; font-family: inherit; background: transparent; }
  .fav-list { display: flex; flex-direction: column; gap: 8px; }
  .fav-item { background: var(--card); border-radius: 14px; padding: 14px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .fav-info { flex: 1; min-width: 0; }
  .fav-name { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .fav-meta { font-size: 13px; color: var(--sub); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .fav-price { font-size: 17px; font-weight: 700; color: var(--accent); white-space: nowrap; }
  .fav-price small { font-size: 11px; font-weight: 400; color: var(--sub); display: block; text-align: right; }
  .delete-btn { background: none; border: none; color: #ff3b30; font-size: 20px; cursor: pointer; padding: 4px; }
  .empty { text-align: center; padding: 48px 16px; color: var(--sub); }

  /* ─── Scanner ─── */
  #reader { width: 100%; border-radius: 14px; overflow: hidden; background: #000; aspect-ratio: 4/3; }
  #reader video { width: 100% !important; border-radius: 14px; }
  .scan-result { background: var(--card); border-radius: 14px; padding: 14px; }
  .scan-code { font-family: monospace; font-size: 14px; color: var(--sub); word-break: break-all; }

  /* ─── Comparison results ─── */
  .compare-item { background: var(--card); border-radius: 14px; padding: 14px; display: flex; flex-direction: column; gap: 4px; }
  .compare-name { font-size: 14px; line-height: 1.4; }
  .compare-footer { display: flex; justify-content: space-between; align-items: center; }
  .compare-shop { font-size: 12px; color: var(--sub); }
  .compare-price { font-size: 17px; font-weight: 700; color: #ff3b30; }
  .spinner { text-align: center; padding: 24px; color: var(--sub); }

  /* ─── Modal ─── */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: flex-end; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--bg); border-radius: 20px 20px 0 0; padding: 20px 16px calc(20px + var(--safe-bottom)); width: 100%; max-height: 90dvh; overflow-y: auto; }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  .modal .row input { text-align: left; }
  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }

  /* ─── Settings ─── */
  .setting-row { display: flex; align-items: center; gap: 8px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .setting-row:last-child { border-bottom: none; }
  .setting-row label { font-size: 15px; flex: 1; }
  .setting-row input { flex: 2; border: none; background: var(--bg); padding: 8px 10px; border-radius: 8px; font-size: 14px; font-family: inherit; }
  .setting-hint { font-size: 12px; color: var(--sub); margin-top: 8px; line-height: 1.5; }
</style>
</head>
<body>

<!-- ── 計算タブ ── -->
<div class="screen active" id="screen-calc">
  <div class="card">
    <div class="card-title">入力</div>
    <div class="row">
      <label>価格</label>
      <input type="number" id="inp-price" placeholder="198" inputmode="decimal">
      <span class="unit">円</span>
    </div>
    <div class="row">
      <label>量</label>
      <input type="number" id="inp-qty" placeholder="500" inputmode="decimal">
      <select id="inp-unit">
        <option value="g">g</option>
        <option value="kg">kg</option>
        <option value="mg">mg</option>
        <option value="ml">ml</option>
        <option value="L">L</option>
        <option value="個">個</option>
        <option value="枚">枚</option>
        <option value="本">本</option>
        <option value="袋">袋</option>
        <option value="箱">箱</option>
      </select>
    </div>
  </div>

  <div class="result-box" id="result-box" style="display:none">
    <div class="result-label" id="result-label">100gあたり</div>
    <div class="result-value" id="result-value">¥0.0</div>
    <div class="result-sub" id="result-sub"></div>
  </div>
  <div class="card" id="result-empty">
    <p style="color:var(--sub); text-align:center; padding:8px 0">価格と量を入力してください</p>
  </div>

  <button class="btn btn-primary" id="btn-save" disabled onclick="openSaveModal()">⭐ お気に入りに保存</button>
</div>

<!-- ── お気に入りタブ ── -->
<div class="screen" id="screen-fav">
  <div class="search-bar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" style="color:var(--sub)"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="fav-search" placeholder="商品名・店名で検索" oninput="renderFavorites()">
  </div>
  <div class="fav-list" id="fav-list"></div>
</div>

<!-- ── スキャンタブ ── -->
<div class="screen" id="screen-scan">
  <div class="card" style="padding:0; overflow:hidden">
    <div id="reader"></div>
  </div>
  <div class="card" id="scan-status">
    <p style="text-align:center; color:var(--sub); padding:4px 0">バーコードをカメラに向けてください</p>
  </div>
  <div id="compare-section" style="display:none; display:flex; flex-direction:column; gap:8px">
    <div class="card scan-result">
      <div style="font-size:13px; color:var(--sub); margin-bottom:4px">スキャン結果</div>
      <div class="scan-code" id="scanned-code"></div>
      <div style="display:flex; gap:8px; margin-top:12px">
        <button class="btn btn-primary" style="font-size:14px" onclick="searchRakuten(lastCode)">楽天で検索</button>
        <button class="btn btn-secondary" style="font-size:14px" onclick="openAmazon(lastCode)">Amazon</button>
      </div>
    </div>
    <div id="compare-results"></div>
    <button class="btn btn-secondary" onclick="resumeScan()">再スキャン</button>
  </div>
</div>

<!-- ── 設定タブ ── -->
<div class="screen" id="screen-settings">
  <div class="card">
    <div class="card-title">楽天 API キー</div>
    <div class="setting-row">
      <label>Application ID</label>
      <input type="text" id="setting-apikey" placeholder="xxxxxxxxxxxxxxxx" oninput="saveApiKey()">
    </div>
    <p class="setting-hint">
      無料で取得できます：<br>
      <a href="https://webservice.rakuten.co.jp/" style="color:var(--accent)">https://webservice.rakuten.co.jp/</a><br><br>
      設定しない場合、楽天での価格比較は使えません。Amazon は設定不要です。
    </p>
  </div>
</div>

<!-- ── タブバー ── -->
<nav class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('calc')" id="tab-calc">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>
    計算
  </button>
  <button class="tab-btn" onclick="switchTab('fav')" id="tab-fav">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    お気に入り
  </button>
  <button class="tab-btn" onclick="switchTab('scan')" id="tab-scan">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7V4h3M17 4h3v3M4 17v3h3M20 17v3h-3M5 12h14"/></svg>
    スキャン
  </button>
  <button class="tab-btn" onclick="switchTab('settings')" id="tab-settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    設定
  </button>
</nav>

<!-- ── 保存モーダル ── -->
<div class="modal-bg" id="save-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">お気に入りに保存</div>
    <div class="card">
      <div class="row">
        <label>商品名</label>
        <input type="text" id="save-name" placeholder="例: 牛乳 1000ml">
      </div>
      <div class="row">
        <label>店名</label>
        <input type="text" id="save-store" placeholder="例: イオン">
      </div>
      <div class="row">
        <label>メモ</label>
        <input type="text" id="save-memo" placeholder="任意">
      </div>
    </div>
    <div class="card" style="margin-top:8px; background:var(--accent-light)">
      <div id="save-preview" style="font-size:14px; color:var(--sub); line-height:1.8"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeSaveModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveFavorite()">保存</button>
    </div>
  </div>
</div>

<script>
// ─── Units ────────────────────────────────────────────────────────────────────
const UNITS = {
  g:  { cat:'weight', factor:1,     base:'100g',  baseAmt:100 },
  kg: { cat:'weight', factor:1000,  base:'100g',  baseAmt:100 },
  mg: { cat:'weight', factor:0.001, base:'100g',  baseAmt:100 },
  ml: { cat:'volume', factor:1,     base:'100ml', baseAmt:100 },
  L:  { cat:'volume', factor:1000,  base:'100ml', baseAmt:100 },
  個: { cat:'count',  factor:1,     base:'個',    baseAmt:1   },
  枚: { cat:'count',  factor:1,     base:'枚',    baseAmt:1   },
  本: { cat:'count',  factor:1,     base:'本',    baseAmt:1   },
  袋: { cat:'count',  factor:1,     base:'袋',    baseAmt:1   },
  箱: { cat:'count',  factor:1,     base:'箱',    baseAmt:1   },
};

function calcUnitPrice(price, qty, unit) {
  const u = UNITS[unit];
  if (!u || qty <= 0 || price <= 0) return null;
  if (u.cat === 'count') return { value: price / qty, base: u.base };
  const normalized = qty * u.factor;
  return { value: price / normalized * u.baseAmt, base: u.base };
}

// ─── Calculator ───────────────────────────────────────────────────────────────
const inpPrice = document.getElementById('inp-price');
const inpQty   = document.getElementById('inp-qty');
const inpUnit  = document.getElementById('inp-unit');

[inpPrice, inpQty, inpUnit].forEach(el => el.addEventListener('input', updateCalc));

function updateCalc() {
  const p = parseFloat(inpPrice.value);
  const q = parseFloat(inpQty.value);
  const u = inpUnit.value;
  const r = calcUnitPrice(p, q, u);

  const box   = document.getElementById('result-box');
  const empty = document.getElementById('result-empty');
  const btn   = document.getElementById('btn-save');

  if (r) {
    box.style.display = 'block';
    empty.style.display = 'none';
    document.getElementById('result-label').textContent = `${r.base}あたり`;
    document.getElementById('result-value').textContent = `¥${r.value.toFixed(1)}`;
    document.getElementById('result-sub').textContent   = `¥${p.toFixed(0)} ÷ ${q}${u}`;
    btn.disabled = false;
  } else {
    box.style.display = 'none';
    empty.style.display = 'block';
    btn.disabled = true;
  }
}

// ─── Save Modal ───────────────────────────────────────────────────────────────
function openSaveModal() {
  const p = parseFloat(inpPrice.value);
  const q = parseFloat(inpQty.value);
  const u = inpUnit.value;
  const r = calcUnitPrice(p, q, u);
  if (!r) return;

  document.getElementById('save-preview').innerHTML =
    `価格: ¥${p.toFixed(0)} &nbsp;|&nbsp; 量: ${q}${u}<br>単価: <strong>¥${r.value.toFixed(2)} / ${r.base}</strong>`;
  document.getElementById('save-modal').classList.add('open');
}

function closeSaveModal() {
  document.getElementById('save-modal').classList.remove('open');
}

function saveFavorite() {
  const name  = document.getElementById('save-name').value.trim();
  const store = document.getElementById('save-store').value.trim();
  if (!name || !store) { alert('商品名と店名を入力してください'); return; }

  const p = parseFloat(inpPrice.value);
  const q = parseFloat(inpQty.value);
  const u = inpUnit.value;
  const r = calcUnitPrice(p, q, u);

  const item = { id: Date.now(), name, store, price: p, qty: q, unit: u, unitPrice: r.value, unitBase: r.base, memo: document.getElementById('save-memo').value.trim(), date: new Date().toISOString() };
  const favs = getFavorites();
  favs.unshift(item);
  localStorage.setItem('tanka_favs', JSON.stringify(favs));

  closeSaveModal();
  document.getElementById('save-name').value = '';
  document.getElementById('save-store').value = '';
  document.getElementById('save-memo').value = '';
  renderFavorites();
}

// ─── Favorites ────────────────────────────────────────────────────────────────
function getFavorites() {
  try { return JSON.parse(localStorage.getItem('tanka_favs') || '[]'); } catch { return []; }
}

function renderFavorites() {
  const q = document.getElementById('fav-search').value.toLowerCase();
  const list = document.getElementById('fav-list');
  const items = getFavorites().filter(i =>
    !q || i.name.toLowerCase().includes(q) || i.store.toLowerCase().includes(q)
  );

  if (!items.length) {
    list.innerHTML = `<div class="empty"><div style="font-size:40px">⭐</div><p style="margin-top:12px">${q ? '見つかりませんでした' : 'お気に入りがありません'}</p></div>`;
    return;
  }

  list.innerHTML = items.map(i => `
    <div class="fav-item">
      <div class="fav-info">
        <div class="fav-name">${esc(i.name)}</div>
        <div class="fav-meta">${esc(i.store)} &nbsp;·&nbsp; ¥${i.price.toFixed(0)} / ${i.qty}${i.unit}${i.memo ? ' &nbsp;·&nbsp; ' + esc(i.memo) : ''}</div>
      </div>
      <div>
        <div class="fav-price">¥${i.unitPrice.toFixed(1)}<small>/${i.unitBase}</small></div>
      </div>
      <button class="delete-btn" onclick="deleteFav(${i.id})">×</button>
    </div>`).join('');
}

function deleteFav(id) {
  if (!confirm('削除しますか？')) return;
  const favs = getFavorites().filter(i => i.id !== id);
  localStorage.setItem('tanka_favs', JSON.stringify(favs));
  renderFavorites();
}

function esc(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ─── Barcode Scanner ──────────────────────────────────────────────────────────
let scanner = null;
let lastCode = '';
let scannerRunning = false;

function startScanner() {
  if (scannerRunning) return;
  const el = document.getElementById('reader');
  el.innerHTML = '';
  scanner = new Html5Qrcode('reader');
  scanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 240, height: 140 } },
    code => {
      if (code === lastCode) return;
      lastCode = code;
      onScanned(code);
    },
    () => {}
  ).then(() => { scannerRunning = true; }).catch(err => {
    document.getElementById('scan-status').innerHTML =
      `<p style="color:#ff3b30; text-align:center">カメラを起動できませんでした。<br><small>${err}</small></p>`;
  });
}

function stopScanner() {
  if (scanner && scannerRunning) { scanner.stop().catch(() => {}); scannerRunning = false; }
}

function onScanned(code) {
  stopScanner();
  document.getElementById('scan-status').style.display = 'none';
  const section = document.getElementById('compare-section');
  section.style.display = 'flex';
  document.getElementById('scanned-code').textContent = code;
  document.getElementById('compare-results').innerHTML = '';
}

function resumeScan() {
  lastCode = '';
  document.getElementById('compare-section').style.display = 'none';
  document.getElementById('scan-status').style.display = 'block';
  document.getElementById('scan-status').innerHTML =
    '<p style="text-align:center; color:var(--sub); padding:4px 0">バーコードをカメラに向けてください</p>';
  startScanner();
}

// ─── Rakuten Search ───────────────────────────────────────────────────────────
async function searchRakuten(keyword) {
  const apiKey = localStorage.getItem('tanka_apikey');
  if (!apiKey) {
    alert('設定タブで楽天APIキーを設定してください（無料）');
    return;
  }

  const el = document.getElementById('compare-results');
  el.innerHTML = '<div class="spinner">楽天市場を検索中…</div>';

  try {
    const params = new URLSearchParams({
      applicationId: apiKey,
      keyword,
      hits: '15',
      sort: '+itemPrice',
      format: 'json'
    });
    const res = await fetch(`https://app.rakuten.co.jp/services/api/IchibaItem/Search/20170706?${params}`);
    const data = await res.json();

    if (!data.Items || !data.Items.length) {
      el.innerHTML = '<div class="card"><p style="color:var(--sub);text-align:center">楽天市場では見つかりませんでした</p></div>';
      return;
    }

    el.innerHTML = data.Items.map(({ Item: i }) => `
      <a href="${esc(i.itemUrl)}" target="_blank" style="text-decoration:none">
        <div class="compare-item">
          <div class="compare-name">${esc(i.itemName)}</div>
          <div class="compare-footer">
            <span class="compare-shop">${esc(i.shopName)}</span>
            <span class="compare-price">¥${Number(i.itemPrice).toLocaleString()}</span>
          </div>
        </div>
      </a>`).join('');
  } catch (e) {
    el.innerHTML = `<div class="card"><p style="color:#ff3b30">エラー: ${e.message}</p></div>`;
  }
}

function openAmazon(keyword) {
  window.open(`https://www.amazon.co.jp/s?k=${encodeURIComponent(keyword)}`, '_blank');
}

// ─── Settings ─────────────────────────────────────────────────────────────────
function saveApiKey() {
  localStorage.setItem('tanka_apikey', document.getElementById('setting-apikey').value.trim());
}

// ─── Tab switching ────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`screen-${tab}`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');

  if (tab === 'scan') { startScanner(); }
  else { stopScanner(); }
  if (tab === 'fav') { renderFavorites(); }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const key = localStorage.getItem('tanka_apikey') || '';
  document.getElementById('setting-apikey').value = key;
  renderFavorites();
});
</script>
</body>
