name: TankaCalc
options:
  bundleIdPrefix: com.yugasource
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

targets:
  TankaCalc:
    type: application
    platform: iOS
    sources:
      - TankaCalc
    info:
      path: TankaCalc/Info.plist
      properties:
        CFBundleDisplayName: 単価計算
        CFBundleName: TankaCalc
        NSCameraUsageDescription: バーコードをスキャンするためにカメラを使用します
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        RakutenApplicationId: "$(RAKUTEN_APP_ID)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yugasource.tankacalc
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
